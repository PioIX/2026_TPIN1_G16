<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahorcado - Registro</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

    <div class="contenedor-vista">
        <a href="index.html" class="enlace-volver" title="Volver al menú principal">
            <img src="img/flecha.png" alt="Flecha para volver atrás">
        </a>
        <h1 class="titulo-ahorcado">AHORCADO</h1>
        
        <div class="caja-principal caja-auth-sola">
            <h2>REGISTRO</h2>
            <div class="grupo-formulario">
                <label>Username</label>
                <input type="text" class="input-texto" placeholder="Crea tu usuario">
            </div>
            <div class="grupo-formulario">
                <label>Contraseña</label>
                <input type="password" class="input-texto" placeholder="Crea tu contraseña">
            </div>
            <div class="grupo-formulario">
                <label>Confirmar contraseña</label>
                <input type="password" class="input-texto" placeholder="Repite la contraseña">
            </div>
            <div class="acciones-auth">
                <a href="categorias.html" class="boton-principal boton-pequeno">Registrarse</a>
                <a href="login.html" class="enlace-auth">Iniciar Sesión</a>
            </div>
        </div>
    </div>

</body>
</html>
