<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahorcado - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles\styles.css">
</head>
<body>

    <div class="contenedor-vista">
        <a href="index.html" class="enlace-volver" title="Volver al menú principal">
            <img src="img/flecha.png" alt="Flecha para volver atrás">
        </a>
        <h1 class="titulo-ahorcado">AHORCADO</h1>
        
        <div class="caja-principal caja-auth-sola">
            <h2>INICIO DE SESIÓN</h2>
            <div class="grupo-formulario">
                <label>Username</label>
                <input type="text" class="input-texto" placeholder="Tu usuario" id="username">
            </div>
            <div class="grupo-formulario">
                <label>Password</label>
                <input type="password" class="input-texto" placeholder="Tu contraseña" id="password">
            </div>
            <div class="acciones-auth">
                <button onclick="buttonLogin()" class="boton-principal boton-pequeno">Iniciar Sesión</button>
                <a href="registro.html" class="enlace-auth">Registrarse</a>
            </div>
        </div>
    </div>

    <script src="scripts/requests.js"></script>
    <script src="scripts/dom.js"></script>
    <script src="scripts/logic.js"></script>
</body>
</html>
